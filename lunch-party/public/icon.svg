<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Shadow under bento box -->
  <ellipse cx="256" cy="390" rx="140" ry="18" fill="#c2410c" opacity=".25"/>
  <!-- Bento box body -->
  <rect x="116" y="210" width="280" height="170" rx="28" fill="#fff" opacity=".95"/>
  <!-- Bento box divider vertical -->
  <line x1="256" y1="218" x2="256" y2="372" stroke="#f97316" stroke-width="3" opacity=".3"/>
  <!-- Bento box divider horizontal (right half) -->
  <line x1="262" y1="295" x2="388" y2="295" stroke="#f97316" stroke-width="3" opacity=".3"/>
  <!-- Rice (left compartment) - simple mound -->
  <ellipse cx="186" cy="300" rx="48" ry="36" fill="#fefce8"/>
  <ellipse cx="186" cy="292" rx="48" ry="28" fill="#fff"/>
  <!-- Small rice grains -->
  <ellipse cx="175" cy="288" rx="6" ry="3" fill="#fef9c3" transform="rotate(-15 175 288)"/>
  <ellipse cx="192" cy="285" rx="6" ry="3" fill="#fef9c3" transform="rotate(10 192 285)"/>
  <ellipse cx="183" cy="295" rx="5" ry="2.5" fill="#fef9c3" transform="rotate(-5 183 295)"/>
  <!-- Meat/main (top-right compartment) -->
  <rect x="278" y="232" width="46" height="22" rx="6" fill="#f59e0b"/>
  <rect x="284" y="240" width="46" height="22" rx="6" fill="#d97706"/>
  <rect x="274" y="248" width="46" height="22" rx="6" fill="#f59e0b"/>
  <!-- Side dish (bottom-right compartment) - veggie circles -->
  <circle cx="300" cy="332" r="14" fill="#4ade80"/>
  <circle cx="330" cy="322" r="12" fill="#86efac"/>
  <circle cx="350" cy="340" r="13" fill="#4ade80"/>
  <circle cx="318" cy="348" r="11" fill="#86efac"/>
  <!-- Bento box lid (lifted, tilted) -->
  <g transform="translate(256 180) rotate(-6) translate(-256 -180)">
    <rect x="108" y="130" width="296" height="56" rx="22" fill="url(#lid)" opacity=".9"/>
    <rect x="108" y="130" width="296" height="56" rx="22" fill="#fff" opacity=".12"/>
    <!-- Lid handle/knob -->
    <rect x="226" y="122" width="60" height="16" rx="8" fill="#fdba74"/>
    <rect x="226" y="122" width="60" height="10" rx="6" fill="#fff" opacity=".3"/>
  </g>
  <!-- Steam lines -->
  <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".6">
    <path d="M200 120 Q205 100 200 80 Q195 60 200 40"/>
    <path d="M256 110 Q261 90 256 70 Q251 50 256 30"/>
    <path d="M312 120 Q317 100 312 80 Q307 60 312 40"/>
  </g>
  <!-- People dots (bottom) -->
  <g opacity=".9">
    <circle cx="196" cy="432" r="16" fill="#fff"/>
    <circle cx="236" cy="432" r="16" fill="#fff" opacity=".7"/>
    <circle cx="276" cy="432" r="16" fill="#fff" opacity=".7"/>
    <circle cx="316" cy="432" r="16" fill="#fff"/>
    <!-- Face dots -->
    <circle cx="190" cy="429" r="2.5" fill="#ea580c"/>
    <circle cx="202" cy="429" r="2.5" fill="#ea580c"/>
    <path d="M192 435 Q196 439 200 435" fill="none" stroke="#ea580c" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="310" cy="429" r="2.5" fill="#ea580c"/>
    <circle cx="322" cy="429" r="2.5" fill="#ea580c"/>
    <path d="M312 435 Q316 439 320 435" fill="none" stroke="#ea580c" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
